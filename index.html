      :root {

      body {
        margin: 0;

        color: var(--ink);
        font-family: Inter, sans-serif;
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.96), transparent 34%),
          radial-gradient(circle at 85% 0%, rgba(234, 230, 225, 0.5), transparent 32%),
          linear-gradient(180deg, #fcfcfb 0%, #f7f5f2 42%, #fafaf9 100%);
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.26;
        background-image:

        mask-image: radial-gradient(circle at center, black 30%, transparent 88%);

      ::selection {
        background: rgba(17, 17, 17, 0.12);
      }

      ::-webkit-scrollbar {
        width: 10px;
      }

      ::-webkit-scrollbar-thumb {
        background: rgba(17, 17, 17, 0.16);
        border-radius: 999px;
      }

      .masonry-grid {
        column-gap: 1.5rem;
      }

      .masonry-item {
        break-inside: avoid;
        margin-bottom: 1.5rem;
      }

      .glass-panel {
        background: rgba(249, 249, 248, 0.66);
        backdrop-filter: blur(18px);
      }

      .grain-card {
        position: relative;
        isolation: isolate;
      }

      .grain-card::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0.12;
        background-image:
          radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.2), transparent 14%),
          radial-gradient(circle at 78% 30%, rgba(255, 255, 255, 0.16), transparent 16%);
        mix-blend-mode: screen;
      }

      .backdrop-fade {
        animation: fadeIn 0.3s ease both;
      }

      .modal-rise {
        animation: fadeUp 0.46s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      .copy-flash {
        animation: slowFloat 1.3s ease;
      }

      @media (min-width: 768px) {
        .masonry-grid {
          column-gap: 1.75rem;
        }

        .masonry-item {
          margin-bottom: 1.75rem;
        }
      }

      @media (min-width: 1280px) {
        .masonry-grid {
          column-gap: 2rem;
        }

        .masonry-item {
          margin-bottom: 2rem;
        }
      }
    </style>

        ["#F7F5F1", "#E0DAD3", "#98979D", "#1E2228"],
        ["#EEE7DE", "#C8B5A0", "#8F857A", "#232120"],

        时尚: "适合作为时尚造型参考",

        日常Vlog: "适合作为创作者日常内容参考",

      };

      const toastDuration = 2200;

      const titleFromString = (value = "") =>
        value
          .replace(/\.[^/.]+$/, "")
          .replace(/[-_]+/g, " ")
          .replace(/\b\w/g, (char) => char.toUpperCase())
          .trim() || "Collected Reference";

      const createFallbackAnalysis = (label, index = 0) => ({
        title: titleFromString(label),
        category: FILTERS.slice(1)[index % (FILTERS.length - 1)],
        moodDescription:
          "整体画面以克制色调和柔和层次为主，具备较强的情绪策展潜力，适合作为高级感情绪板的基础参考。",
        tags: FALLBACK_TAG_SETS[index % FALLBACK_TAG_SETS.length],
        palette: FALLBACK_PALETTES[index % FALLBACK_PALETTES.length],
        provider: "本地兜底",
        model: "本地风格生成",
      });

      const withItemDefaults = (item) => ({
        ...item,
        title: item.title || "Collected Reference",
        category: item.category || "编辑大片",
        description: item.description || item.moodDescription || "精炼的视觉情绪分析。",

        tags: item.tags || ["#静奢", "#低饱和", "#编辑感"],
        colors: item.colors || item.palette || ["#F5F1EA", "#D7CEC3", "#9B948D", "#1C1C1C"],
        ratio: item.ratio || "4 / 5",
        scene: item.scene || "情绪板参考图",
        usage: item.usage || CATEGORY_USAGE[item.category] || "适合作为品牌企划参考",
        analysisSource: item.analysisSource || "策展样片",
        analysisProvider: item.analysisProvider || "Vibe Collector 片库",
      });

      const fileToDataUrl = (file) =>
        new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result));
          reader.onerror = () => reject(new Error("读取图片文件失败"));
          reader.readAsDataURL(file);
        });

      function App() {
        const [activeFilter, setActiveFilter] = useState("全部");
        const deferredFilter = useDeferredValue(activeFilter);
        const [items, setItems] = useState(SEED_ITEMS.map((item) => withItemDefaults(item)));
        const [selectedItem, setSelectedItem] = useState(null);
        const [uploadOpen, setUploadOpen] = useState(false);
        const [uploadDrafts, setUploadDrafts] = useState([]);
        const [dragOver, setDragOver] = useState(false);
        const [isAnalyzing, setIsAnalyzing] = useState(false);
        const [activeUploadId, setActiveUploadId] = useState("");
        const [uploadProgressText, setUploadProgressText] = useState("");
        const [isRefreshingSelected, setIsRefreshingSelected] = useState(false);
        const [minimaxReady, setMinimaxReady] = useState(null);
        const [toasts, setToasts] = useState([]);
        const [copiedColor, setCopiedColor] = useState("");
        const fileInputRef = useRef(null);

        const galleryItems = useMemo(() => {
          if (deferredFilter === "全部") {
            return items;
          }

          return items.filter((item) => item.category === deferredFilter);
        }, [items, deferredFilter]);

        const filterCounts = useMemo(() => {
          return FILTERS.reduce((acc, filter) => {
            acc[filter] = filter === "全部" ? items.length : items.filter((item) => item.category === filter).length;
            return acc;
          }, {});
        }, [items]);

        const minimaxCount = useMemo(
          () => items.filter((item) => item.analysisSource === "MiniMax").length,
          [items]
        );

        useEffect(() => {
          const handleEscape = (event) => {
            if (event.key === "Escape") {
              setSelectedItem(null);
              setUploadOpen(false);
              setUploadDrafts([]);
              setDragOver(false);
            }
          };

          window.addEventListener("keydown", handleEscape);
          return () => window.removeEventListener("keydown", handleEscape);
        }, []);

        useEffect(() => {
          let cancelled = false;

          const loadHealth = async () => {
            try {
              const response = await fetch("/api/health");
              const data = await response.json();
              if (!cancelled) {
                setMinimaxReady(Boolean(data.minimaxConfigured));
              }
            } catch (error) {
              if (!cancelled) {
                setMinimaxReady(false);
              }
            }
          };

          loadHealth();

          return () => {
            cancelled = true;
          };
        }, []);

        const showToast = (message) => {
          const id = `${Date.now()}-${Math.random()}`;
          setToasts((current) => [...current, { id, message }]);
          window.setTimeout(() => {
            setToasts((current) => current.filter((toast) => toast.id !== id));
          }, toastDuration);
        };

        const copyText = async (value) => {
          try {
            if (navigator.clipboard && window.isSecureContext) {
              await navigator.clipboard.writeText(value);
            } else {
              const input = document.createElement("textarea");
              input.value = value;
              input.style.position = "fixed";
              input.style.opacity = "0";
              document.body.appendChild(input);
              input.focus();
              input.select();
              document.execCommand("copy");
              document.body.removeChild(input);
            }

            setCopiedColor(value);
            showToast(`${value} 已复制到剪贴板`);
            window.setTimeout(() => setCopiedColor(""), 1200);
          } catch (error) {
            showToast("当前环境暂不支持复制");
          }
        };

        const updateItemInState = (itemId, nextItem) => {
          const safeItem = withItemDefaults(nextItem);
          setItems((current) => current.map((item) => (item.id === itemId ? safeItem : item)));
          setSelectedItem((current) => (current && current.id === itemId ? safeItem : current));
        };

        const refreshMiniMaxStatus = async () => {
          try {
            const response = await fetch("/api/health");
            const data = await response.json();
            const ready = Boolean(data.minimaxConfigured);
            setMinimaxReady(ready);
            return ready;
          } catch (error) {
            setMinimaxReady(false);
            return false;
          }
        };

        const requestMiniMaxAnalysis = async (payload) => {
          const response = await fetch("/api/analyze", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(payload),
          });

          const data = await response.json().catch(() => ({}));
          if (!response.ok) {
            throw new Error(data.error || "MiniMax 分析失败");
          }

          return data;
        };

        const applyAnalysisToItem = (item, analysis) =>

            const payload = selectedItem.sourceDataUrl

                  imageDataUrl: selectedItem.sourceDataUrl,
                  filename: selectedItem.sourceFilename || selectedItem.title,

                  imageUrl: selectedItem.image,
                  filename: selectedItem.title,

            const analysis = await requestMiniMaxAnalysis(payload);
            const nextItem = applyAnalysisToItem(selectedItem, analysis);
            updateItemInState(selectedItem.id, nextItem);
            showToast("MiniMax 分析已刷新");

            showToast(error.message || "MiniMax 分析失败");

        const pickFiles = (fileList) => {

                preview: URL.createObjectURL(file),
                title: titleFromString(file.name),
                category: "编辑大片",
                description: "等待 MiniMax 分析。",
                moodDescription: "等待 MiniMax 分析。",
                tags: FALLBACK_TAG_SETS[index % FALLBACK_TAG_SETS.length],

                  filename: draft.file.name,

                      image: draft.preview,

                          type="button"
                          onClick={() => copyText(selectedItem.tags.join(" "))}
                          className="inline-flex items-center justify-center gap-2 rounded-full bg-black/5 px-5 py-3 text-sm font-medium text-black/72 transition duration-300 hover:bg-black/8"
                        >
                          <Copy size={16} strokeWidth={1.9} />
                          复制标签
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {uploadOpen && (
              <div className="backdrop-fade fixed inset-0 z-40 flex items-center justify-center bg-black/45 px-4 py-6 md:px-6">
                <div className="modal-rise relative w-full max-w-3xl overflow-hidden rounded-[2rem] bg-[rgba(249,249,248,0.96)] shadow-panel backdrop-blur-2xl">
                  <button
                    type="button"
                    onClick={() => {
                      setUploadOpen(false);
                      setUploadDrafts([]);
                      setDragOver(false);
                    }}
                    className="absolute right-4 top-4 z-10 rounded-full bg-white/85 p-2.5 text-black shadow-soft transition duration-300 hover:scale-105"
                  >
                    <X size={18} strokeWidth={2} />
                  </button>

                  <div className="grid gap-6 p-6 md:grid-cols-[minmax(0,1fr)_minmax(290px,0.82fr)] md:p-8">
                    <div>
                      <div className="text-[0.72rem] uppercase tracking-[0.28em] text-black/40">上传灵感图</div>
                      <h2 className="mt-4 font-display text-[2.2rem] leading-[1.02] tracking-[-0.03em] text-ink md:text-[2.75rem]">
                        把新的灵感图
                        <br />
                        放进你的看板。
                      </h2>
                      <p className="mt-4 max-w-lg text-sm leading-7 text-black/62">
                        这里已经接入真实 MiniMax 分析。上传图片后，系统会生成中文视觉标签、情绪描述与色卡结果。
                      </p>

                      <button
                        type="button"
                        onClick={() => fileInputRef.current?.click()}
                        onDragOver={(event) => {
                          event.preventDefault();
                          setDragOver(true);
                        }}
                        onDragLeave={() => setDragOver(false)}
                        onDrop={(event) => {
                          event.preventDefault();
                          setDragOver(false);
                          pickFiles(event.dataTransfer.files);
                        }}
                        className={`mt-8 flex min-h-[280px] w-full flex-col items-center justify-center rounded-[1.8rem] px-6 text-center transition duration-300 ${
                          dragOver ? "bg-ink text-white shadow-float" : "bg-white/70 text-black/70 ring-1 ring-black/5"
                        }`}
                      >
                        <div className={`rounded-full p-4 ${dragOver ? "bg-white/12" : "bg-black/5"}`}>
                          <ImagePlus size={26} strokeWidth={1.75} />
                        </div>
                        <div className="mt-5 text-base font-medium">把图片拖到这里，或从设备中选择</div>
                        <div className={`mt-2 max-w-sm text-sm leading-6 ${dragOver ? "text-white/75" : "text-black/48"}`}>
                          支持 JPG、PNG、WEBP 格式。
                        </div>
                        <div
                          className={`mt-5 rounded-full px-4 py-2 text-xs uppercase tracking-[0.24em] ${
                            dragOver ? "bg-white/12 text-white" : "bg-black/5 text-black/60"
                          }`}
                        >
                          MiniMax 实时分析
                        </div>
                      </button>

                      <input
                        ref={fileInputRef}
                        type="file"
                        accept="image/*"
                        multiple
                        onChange={(event) => pickFiles(event.target.files)}
                        className="hidden"
                      />
                    </div>

                    <div className="flex flex-col rounded-[1.8rem] bg-white/60 p-5 shadow-[0_1px_0_rgba(17,17,17,0.04)]">
                      <div className="flex items-center justify-between gap-3">
                        <div>
                          <div className="text-[0.72rem] uppercase tracking-[0.28em] text-black/40">待处理图片</div>
                          <div className="mt-2 text-sm text-black/55">
                            {isAnalyzing && uploadProgressText ? uploadProgressText : `${uploadDrafts.length} 张待分析`}
                          </div>
                        </div>
                        <div className="rounded-full bg-black/5 p-3 text-black/70">
                          <Sparkles size={18} strokeWidth={1.9} />
                        </div>
                      </div>

                      <div className="mt-5 flex-1 space-y-3 overflow-y-auto pr-1">
                        {uploadDrafts.length ? (
                          uploadDrafts.map((draft) => (
                            <div
                              key={draft.localId}
                              className="flex items-center gap-4 rounded-[1.3rem] bg-paper p-3 ring-1 ring-black/5"
                            >
                              <img
                                src={draft.preview}
                                alt={draft.title}
                                className="h-16 w-16 rounded-[1rem] object-cover"
                              />
                              <div className="min-w-0 flex-1">
                                <div className="truncate text-sm font-medium text-ink">{draft.title}</div>
                                <div className="mt-1 truncate text-xs uppercase tracking-[0.2em] text-black/36">
                                  {draft.category}
                                </div>
                                <div className="mt-2 flex items-center gap-1.5">
                                  {draft.colors.map((color) => (
                                    <span
                                      key={color}
                                      className="h-3.5 w-3.5 rounded-full"
                                      style={{ backgroundColor: color }}
                                    />
                                  ))}
                                </div>
                              </div>
                              <button
                                type="button"
                                onClick={() => removeDraft(draft.localId)}
                                className="rounded-full bg-black/5 p-2 text-black/55 transition hover:bg-black/8"
                              >
                                <X size={15} strokeWidth={2} />
                              </button>
                            </div>
                          ))
                        ) : (
                          <div className="flex h-full min-h-[220px] items-center justify-center rounded-[1.4rem] border border-dashed border-black/8 bg-paper/60 px-6 text-center text-sm leading-6 text-black/42">
                            还没有选择图片。上传后即可预览 MiniMax 输出的中文标签、情绪描述和色卡。
                          </div>
                        )}
                      </div>

                      <button
                        type="button"
                        onClick={handleUploadConfirm}
                        disabled={isAnalyzing}
                        className={`mt-5 inline-flex items-center justify-center gap-2 rounded-full px-5 py-3 text-sm font-medium transition duration-300 ${
                          isAnalyzing
                            ? "bg-black/10 text-black/45"
                            : "bg-ink text-white hover:-translate-y-0.5 hover:bg-black hover:shadow-float"
                        }`}
                      >
                        <Upload size={16} strokeWidth={1.9} />
                        {isAnalyzing ? "正在分析视觉内容..." : "加入画廊"}
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
